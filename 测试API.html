<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API测试</title>
  <style>
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: #a78bfa; }
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { opacity: 0.9; }
    pre {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { color: #34d399; }
    .error { color: #f87171; }
    .info { color: #a78bfa; }
  </style>
</head>
<body>
  <h1>🧪 API 测试工具</h1>

  <div>
    <button onclick="testGet()">📥 测试 GET /api/tasks</button>
    <button onclick="testPost()">📤 测试 POST /api/tasks</button>
    <button onclick="clearLog()">🗑️ 清空日志</button>
  </div>

  <pre id="log">点击上方按钮开始测试...</pre>

  <script>
    const API_BASE = '/api/tasks';

    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const className = type;
      logEl.innerHTML += `<span class="${className}">[${timestamp}] ${msg}</span>\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '日志已清空...\n';
    }

    async function testGet() {
      log('📥 开始 GET 请求...');
      try {
        const response = await fetch(API_BASE);
        log(`✅ 响应状态: ${response.status} ${response.statusText}`, 'success');
        const data = await response.json();
        log(`✅ 收到数据: ${JSON.stringify(data, null, 2)}`, 'success');
      } catch (error) {
        log(`❌ 请求失败: ${error.message}`, 'error');
        log(`错误详情: ${error.stack}`, 'error');
      }
    }

    async function testPost() {
      const testData = [
        {
          id: Date.now(),
          title: '测试任务 - ' + new Date().toLocaleString(),
          date: '2026-03-17',
          time: '10:00',
          priority: 'high',
          done: false,
          createdAt: Date.now()
        }
      ];

      log('📤 开始 POST 请求...');
      log(`📊 发送数据: ${JSON.stringify(testData, null, 2)}`, 'info');

      try {
        const response = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(testData)
        });

        log(`✅ 响应状态: ${response.status} ${response.statusText}`, 'success');
        const result = await response.json();
        log(`✅ 服务器响应: ${JSON.stringify(result, null, 2)}`, 'success');

        // 再次获取验证
        log('📥 验证：再次 GET 请求...');
        const getResponse = await fetch(API_BASE);
        const getData = await getResponse.json();
        log(`✅ 验证成功，当前数据: ${JSON.stringify(getData, null, 2)}`, 'success');

      } catch (error) {
        log(`❌ 请求失败: ${error.message}`, 'error');
        log(`错误详情: ${error.stack}`, 'error');
      }
    }
  </script>
</body>
</html>
